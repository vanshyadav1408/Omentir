services:
  omentir:
    build: .
    env_file: .env
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
