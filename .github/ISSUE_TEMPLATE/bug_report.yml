name: Bug report
description: Report a reproducible Omentir defect
body:
  - type: input
    id: version
    attributes:
      label: Release tag
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction and expected behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized logs or screenshots
